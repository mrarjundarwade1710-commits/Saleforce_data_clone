<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Salesforce Data Cloud Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="bg-primary text-white p-4 text-center">
                        <a href="index.html" class="d-inline-flex align-items-center text-white text-decoration-none mb-3">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Salesforce.com_logo.svg" alt="Salesforce Home" width="52" class="me-2">
                            <span class="fw-bold">Data 360</span>
                        </a>
                        <h1 class="h3 mb-2">Welcome back</h1>
                        <p class="mb-0 opacity-75">Sign in to continue to your Salesforce workspace</p>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="you@company.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter your password" required>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Remember me</label>
                                </div>
                                <a href="contact.html" class="small text-decoration-none">Need help?</a>
                            </div>

                            <button type="submit" class="btn btn-sf-primary w-100 py-3 mb-3">Sign In</button>

                            <div class="text-center text-muted small mb-3">or continue with</div>
                            <div class="d-grid gap-2">
                                <a href="dashboard.html" class="btn btn-outline-secondary">
                                    <i class="fa-brands fa-google me-2"></i>Continue with Google
                                </a>
                                <a href="dashboard.html" class="btn btn-outline-secondary">
                                    <i class="fa-brands fa-microsoft me-2"></i>Continue with Microsoft
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4 small text-muted">
                    Don’t have an account? <a href="contact.html" class="text-decoration-none fw-semibold">Contact Sales</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
